spec_version: 1
name: meta_hackathon
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: Deterministic OpenEnv benchmark for CI/CD pipeline repair.
tasks:
  - task_id: easy_merge_conflict
    key: easy
    title: Resolve failing merge stage
    difficulty: easy
  - task_id: medium_docker_dep_failure
    key: medium
    title: Repair docker build dependency failure
    difficulty: medium
  - task_id: security_secrets_iam_misconfig
    key: security
    title: Fix IAM writer role and exposed CI secret
    difficulty: security
  - task_id: hard_multiservice_cascade
    key: hard
    title: Resolve multi-service registry and deploy cascade
    difficulty: hard
graders:
  module: server.graders
  function: grade_episode

