#
# Two backends are supported:
#   SQLite (default)  — docker compose up
#   Postgres sidecar  — docker compose --profile postgres up
#                       (also set DB_BACKEND=postgres in your shell or .env)
#
# Fault-injection flags (set in .env or shell before `docker compose up`):
#   BAD_MIGRATION_SQL=true   WRONG_DATABASE_URL=true
#   SCHEMA_DRIFT=true        MISSING_VOLUME=true   INIT_ORDER_RACE=true
# See db/faults.py for the full registry.

services:

  env-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: meta-hackathon-env:latest
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pipeline-workspaces:/tmp/workspaces
      - ./logs:/app/logs
    environment:
      - PIPELINE_WORKSPACES_ROOT=/tmp/workspaces
      - ENABLE_WEB_INTERFACE=true
      - LOG_PATH=/app/logs/app.log
      - LOG_LEVEL=INFO
      - SERVICE_NAME=env-server
      - DB_BACKEND=${DB_BACKEND:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-postgresql://app:secret@db:5432/appdb}
      - BAD_MIGRATION_SQL=${BAD_MIGRATION_SQL:-false}
      - SCHEMA_DRIFT=${SCHEMA_DRIFT:-false}
      - WRONG_DATABASE_URL=${WRONG_DATABASE_URL:-false}
    # required: false means this guard is silently skipped when the postgres
    # profile is inactive (SQLite mode). The INIT_ORDER_RACE fault removes this block.
    depends_on:
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: meta-hackathon-agent:latest
    depends_on:
      env-server:
        condition: service_healthy
    environment:
      - ENV_BASE_URL=http://env-server:8000
      - MODEL_NAME=${MODEL_NAME:-}
      - API_BASE_URL=${API_BASE_URL:-https://router.huggingface.co/v1}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - INFERENCE_VERBOSE=${INFERENCE_VERBOSE:-false}
    command: ["python", "-m", "agent.runner"]

  db:
    image: postgres:15-alpine
    profiles: [postgres]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pipeline-workspaces:
  pgdata:
