name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dependencies
        run: |
          python -m pip install -r services/api/requirements.txt

      - name: Run tests
        retry: 1
        run: |
          python -m pytest tests/ --tb=short -q

      - name: Deploy smoke check
        env:
          APP_ENV: "ci"
        run: |
          python -m services.api.app --help

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        run: terraform apply -auto-approve
